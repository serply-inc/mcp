services:

  mcp:
    build: .
    image: serply-mcp-server:latest
    container_name: serply-mcp
    restart: unless-stopped
    environment:
      # Fallback key used for stdio transport or when no per-request key is provided.
      # In HTTP mode the caller's X-Api-Key header is used instead.
      SERPLY_API_KEY: ${SERPLY_API_KEY:?SERPLY_API_KEY is required}
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: "8000"
      LOG_LEVEL: INFO
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: serply-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      mcp:
        condition: service_healthy
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - internal

networks:
  internal:
    driver: bridge
